<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم شيخ البلد - التقييمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #e67e22; 
            --bg-gradient: linear-gradient(135deg, #1a1a1a 0%, #2c1100 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-small {
            width: 80px;
            background: #fff;
            border-radius: 50%;
            padding: 5px;
            border: 2px solid var(--primary-color);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
        .stat-card i { font-size: 30px; color: var(--primary-color); margin-bottom: 10px; }
        .stat-card h3 { margin: 5px 0; font-size: 14px; color: #aaa; }
        .stat-card .value { font-size: 24px; font-weight: bold; }

        /* Table Section */
        .reviews-section {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 25px;
            overflow-x: auto;
        }

        h2 { border-right: 4px solid var(--primary-color); padding-right: 15px; margin-bottom: 25px; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            text-align: right;
            padding: 15px;
            background: rgba(230, 126, 34, 0.2);
            color: var(--primary-color);
            border-bottom: 2px solid var(--glass-border);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 14px;
        }

        .star-rating { color: #f1c40f; font-size: 12px; }
        .branch-badge {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
        }

        .comment-text {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccc;
        }

        /* Empty State */
        .empty-state { text-align: center; padding: 50px; color: #888; }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <img src="https://i.ibb.co/L8p5XvV/sheikh-logo.png" alt="شيخ البلد" class="logo-small">
            <h1>لوحة تحكم التقييمات</h1>
            <p>متابعة جودة الأداء لجميع الفروع</p>
        </header>

        <!-- كروت الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3>إجمالي التقييمات</h3>
                <div class="value" id="totalReviews">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-star"></i>
                <h3>متوسط الجودة</h3>
                <div class="value" id="avgRating">0.0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-store"></i>
                <h3>الفرع الأكثر تقييماً</h3>
                <div class="value" id="topBranch">-</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-smile"></i>
                <h3>نسبة الرضا</h3>
                <div class="value" id="satisfaction">0%</div>
            </div>
        </div>

        <!-- جدول البيانات -->
        <div class="reviews-section">
            <h2>أحدث الملاحظات</h2>
            <table id="reviewsTable">
                <thead>
                    <tr>
                        <th>العميل</th>
                        <th>الفرع</th>
                        <th>المنتج</th>
                        <th>الخدمة</th>
                        <th>النظافة</th>
                        <th>الملاحظات</th>
                        <th>التاريخ</th>
                    </tr>
                </thead>
                <tbody id="reviewsBody">
                    <!-- البيانات ستظهر هنا -->
                </tbody>
            </table>
            <div id="noData" class="empty-state" style="display: none;">
                <i class="fas fa-folder-open" style="font-size: 40px; margin-bottom: 10px;"></i>
                <p>لا توجد تقييمات مسجلة بعد</p>
            </div>
        </div>
    </div>

<!-- استدعاء مكتبات Firebase -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1J7lSkqHHShPlkvtIUwpgmgsGqJ1uhJQ",
        authDomain: "sheikh-pro-61502.firebaseapp.com",
        databaseURL: "https://sheikh-pro-61502-default-rtdb.firebaseio.com",
        projectId: "sheikh-pro-61502",
        storageBucket: "sheikh-pro-61502.firebasestorage.app",
        messagingSenderId: "388665698743",
        appId: "1:388665698743:web:7eca2bfc0223f9c1736032",
        measurementId: "G-5F3J5S68LP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function renderStars(count) {
        let stars = '';
        for(let i=0; i<5; i++) {
            stars += `<i class="${i < count ? 'fas' : 'far'} fa-star"></i>`;
        }
        return `<span class="star-rating">${stars}</span>`;
    }

    // جلب البيانات مباشرة من Firebase عند حدوث أي تغيير
    const reviewsRef = ref(db, 'reviews');
    onValue(reviewsRef, (snapshot) => {
        const tbody = document.getElementById('reviewsBody');
        const data = snapshot.val();

        if (!data) {
            document.getElementById('noData').style.display = 'block';
            document.getElementById('totalReviews').innerText = '0';
            return;
        }

        document.getElementById('noData').style.display = 'none';
        tbody.innerHTML = '';
        
        let totalScore = 0;
        let branchCounts = {};
        let count = 0;

        // Firebase returns an object, so we loop through its keys
        Object.keys(data).reverse().forEach(key => {
            const item = data[key];
            count++;
            const avgItem = (item.product + item.service + item.clean) / 3;
            totalScore += avgItem;
            branchCounts[item.branch] = (branchCounts[item.branch] || 0) + 1;

            const row = `
                <tr>
                    <td>
                        <strong>${item.name}</strong><br>
                        <small style="color:#888">${item.phone}</small>
                    </td>
                    <td><span class="branch-badge">${item.branch}</span></td>
                    <td>${renderStars(item.product)}</td>
                    <td>${renderStars(item.service)}</td>
                    <td>${renderStars(item.clean)}</td>
                    <td><div class="comment-text" title="${item.comment}">${item.comment || 'لا يوجد تعليق'}</div></td>
                    <td>${item.date}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        // تحديث الإحصائيات
        document.getElementById('totalReviews').innerText = count;
        const avg = (totalScore / count).toFixed(1);
        document.getElementById('avgRating').innerText = avg;
        document.getElementById('satisfaction').innerText = Math.round((avg / 5) * 100) + '%';
        
        const topBranch = Object.keys(branchCounts).reduce((a, b) => branchCounts[a] > branchCounts[b] ? a : b, '-');
        document.getElementById('topBranch').innerText = topBranch;
    });
</script>
</body>
</html>
