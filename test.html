<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شيخ البلد - التقييم الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #e67e22; 
            --bg-color: #0f0f0f;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow-x: hidden;
            perspective: 1000px;
        }

        /* حاوية الحركة 3D */
        .tilt-container {
            width: 95%; max-width: 450px;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            padding: 20px 0;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary-color); background: #fff; margin-bottom: 15px; }

        /* الروابط */
        .links-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .link-btn {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.1); padding: 12px 20px;
            border-radius: 15px; text-decoration: none; color: white; transition: 0.3s;
        }
        .link-btn:hover { background: var(--primary-color); transform: scale(1.02); }

        /* نافذة التقييم (المودال) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            z-index: 2000; overflow-y: auto; padding: 20px 10px;
        }

        /* تصميم الكروت البيضاء مثل الصورة */
        .form-card {
            background: #fff; color: #000;
            border-radius: 15px; padding: 25px 20px;
            margin-bottom: 15px; text-align: right;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 100%; max-width: 480px; margin-left: auto; margin-right: auto;
            box-sizing: border-box;
        }

        .q-title { font-weight: bold; font-size: 18px; margin-bottom: 8px; display: block; }
        .q-title span { color: #d93025; margin-right: 4px; }
        .q-sub { font-size: 13px; color: #70757a; margin-bottom: 20px; display: block; }

        .input-line {
            width: 100%; border: none; border-bottom: 1px solid #dadce0;
            padding: 10px 0; font-family: 'Cairo'; font-size: 15px;
            outline: none; transition: border-bottom 0.3s;
        }
        .input-line:focus { border-bottom: 2px solid var(--primary-color); }

        /* التقييم بالنجوم */
        .stars-row { display: flex; justify-content: space-around; width: 100%; margin-top: 10px; }
        .star-item { text-align: center; cursor: pointer; }
        .star-item span { display: block; font-size: 12px; margin-bottom: 5px; color: #70757a; }
        .star-item i { font-size: 24px; color: #ddd; transition: 0.2s; }
        .star-item i.active { color: #f1c40f; }

        .submit-btn {
            background: #d93025; color: white; border: none;
            padding: 12px 35px; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 16px; margin: 20px 0;
        }

        .close-btn { color: #fff; font-size: 30px; cursor: pointer; align-self: flex-start; margin-bottom: 20px; }

    </style>
</head>
<body>

    <div class="tilt-container" id="tiltCard">
        <div class="main-card">
            <img src="images.jpg" class="logo-img">
            <h2 style="margin:0">شيخ البلد</h2>
            <p style="color:#aaa; font-size:14px; margin-bottom:25px;">كفتة زمان بالمتر</p>

            <div class="links-grid">
                <a href="https://shaykhalbalad.github.io/shaykh-albalad/Menu" class="link-btn">
                    <i class="fas fa-utensils"></i><span>المنيو (Menu)</span><i class="fas fa-chevron-left"></i>
                </a>
                <div class="link-btn" onclick="openModal()" style="cursor:pointer; background:rgba(230,126,34,0.2); border:1px solid var(--primary-color)">
                    <i class="fas fa-star" style="color:#f1c40f"></i><span>قيم تجربتك (التقييم الكامل)</span><i class="fas fa-chevron-left"></i>
                </div>
                <a href="https://www.tiktok.com/@sheikhelbalad1" class="link-btn"><i class="fab fa-tiktok"></i><span>تيك توك</span><i class="fas fa-chevron-left"></i></a>
                <a href="https://www.facebook.com/hatysheikhelbalad" class="link-btn"><i class="fab fa-facebook"></i><span>فيسبوك</span><i class="fas fa-chevron-left"></i></a>
                <a href="tel:15188" class="link-btn"><i class="fas fa-phone"></i><span>الخط الساخن: 15188</span><i class="fas fa-chevron-left"></i></a>
            </div>
        </div>
    </div>

    <!-- المودال (الاستبيان) -->
    <div class="modal-overlay" id="ratingModal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <form id="sheikhForm">
            
            <!-- 1. الاسم (أول حاجة) -->
            <div class="form-card">
                <label class="q-title">الاسم <span>*</span></label>
                <span class="q-sub">بعض المعلومات الشخصية تفيدنا في حال الربح فقط</span>
                <input type="text" id="g_name" class="input-line" placeholder="Your answer" required>
            </div>

            <!-- 2. رقم التليفون -->
            <div class="form-card">
                <label class="q-title">رقم التليفون <span>*</span></label>
                <input type="tel" id="g_phone" class="input-line" placeholder="Your answer" required>
            </div>

            <!-- 3. اختيار الفرع (جديد) -->
            <div class="form-card">
                <label class="q-title">اختر الفرع <span>*</span></label>
                <select id="g_branch" class="input-line" required style="background:none;">
                    <option value="" disabled selected>Choose Branch</option>
                    <option value="المهندسين">فرع المهندسين</option>
                    <option value="التجمع">فرع التجمع الخامس</option>
                    <option value="اكتوبر">فرع 6 أكتوبر</option>
                    <option value="المعادي">فرع المعادي</option>
                    <option value="دليفري">دليفري / تيك أواي</option>
                </select>
            </div>

            <!-- 4. جودة المنتج -->
            <div class="form-card">
                <label class="q-title">المنتج <span>*</span></label>
                <span class="q-sub">بالرجاء جدا تقييم طبيعتك</span>
                <div class="stars-row" data-cat="product">
                    <div class="star-item" data-v="1"><span>1</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="2"><span>2</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="3"><span>3</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="4"><span>4</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="5"><span>5</span><i class="far fa-star"></i></div>
                </div>
            </div>

            <!-- 5. الخدمة -->
            <div class="form-card">
                <label class="q-title">الخدمة <span>*</span></label>
                <span class="q-sub">بالرجاء جدا تقييم طبيعتك</span>
                <div class="stars-row" data-cat="service">
                    <div class="star-item" data-v="1"><span>1</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="2"><span>2</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="3"><span>3</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="4"><span>4</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="5"><span>5</span><i class="far fa-star"></i></div>
                </div>
            </div>

            <!-- 6. النظافة -->
            <div class="form-card">
                <label class="q-title">النظافة <span>*</span></label>
                <span class="q-sub">بالرجاء جدا تقييم طبيعتك</span>
                <div class="stars-row" data-cat="clean">
                    <div class="star-item" data-v="1"><span>1</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="2"><span>2</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="3"><span>3</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="4"><span>4</span><i class="far fa-star"></i></div>
                    <div class="star-item" data-v="5"><span>5</span><i class="far fa-star"></i></div>
                </div>
            </div>

            <div style="text-align: right; width:100%; max-width:480px; margin:auto;">
                <button type="submit" class="submit-btn">Submit</button>
            </div>
        </form>
    </div>

<script type="module">
    // --- Tilt Effect (حركة الموبايل والماوس) ---
    const card = document.getElementById('tiltCard');
    
    // للماوس
    document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 20;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 20;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // للموبايل (الجيروسكوب)
    window.addEventListener('deviceorientation', (e) => {
        let x = e.beta / 5;
        let y = e.gamma / 5;
        card.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
    });

    // --- Firebase & Form Logic ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1J7lSkqHHShPlkvtIUwpgmgsGqJ1uhJQ",
        authDomain: "sheikh-pro-61502.firebaseapp.com",
        databaseURL: "https://sheikh-pro-61502-default-rtdb.firebaseio.com",
        projectId: "sheikh-pro-61502",
        storageBucket: "sheikh-pro-61502.firebasestorage.app",
        messagingSenderId: "388665698743",
        appId: "1:388665698743:web:7eca2bfc0223f9c1736032"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.openModal = () => document.getElementById('ratingModal').style.display = 'flex';
    window.closeModal = () => document.getElementById('ratingModal').style.display = 'none';

    let scores = { product: 0, service: 0, clean: 0 };

    document.querySelectorAll('.star-item').forEach(item => {
        item.onclick = function() {
            const cat = this.parentElement.dataset.cat;
            const val = parseInt(this.dataset.v);
            scores[cat] = val;
            
            const stars = this.parentElement.querySelectorAll('i');
            stars.forEach((s, idx) => {
                if(idx < val) { s.classList.replace('far', 'fas'); s.classList.add('active'); }
                else { s.classList.replace('fas', 'far'); s.classList.remove('active'); }
            });
        }
    });

    document.getElementById('sheikhForm').onsubmit = async (e) => {
        e.preventDefault();
        if(scores.product==0 || scores.service==0 || scores.clean==0) { alert("من فضلك قيم النجوم أولاً"); return; }
        
        const btn = e.target.querySelector('button');
        btn.innerText = "Sending...";
        
        const data = {
            name: document.getElementById('g_name').value,
            phone: document.getElementById('g_phone').value,
            branch: document.getElementById('g_branch').value,
            ratings: scores,
            time: new Date().toLocaleString('ar-EG')
        };

        try {
            await push(ref(db, 'final_feedback'), data);
            alert('شكراً لك! تم إرسال تقييمك بنجاح.');
            location.reload();
        } catch { alert('خطأ في الاتصال'); btn.innerText = "Submit"; }
    };
</script>
</body>
</html>
