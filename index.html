<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شيخ البلد - القائمة والتقييم</title>
    <!-- خط جوي من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #e67e22; 
            --tiktok-color: #00f2ea;  
            --google-color: #4285F4;  
            --bg-gradient: linear-gradient(135deg, #1a1a1a 0%, #3d1c02 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 20px;
        }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(230, 126, 34, 0.5);
            object-fit: contain;
            background: #fff;
        }

        h1 { font-size: 28px; margin-bottom: 5px; }
        p { color: #ccc; margin-bottom: 30px; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.1);
            padding: 14px 25px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
            transform: scale(1.02);
        }

        .link-text { font-weight: bold; font-size: 17px; flex-grow: 1; margin-right: 15px; text-align: right; }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #1a1a1a;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 25px;
            padding: 30px;
            border: 1px solid var(--primary-color);
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) #222;
        }

        .close-modal {
            position: absolute;
            top: 15px; left: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #888;
            z-index: 10;
        }

        /* Form Elements */
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #fff; font-size: 14px; }
        
        .rating-group { margin-bottom: 25px; text-align: right; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .rating-group label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--primary-color); }
        .stars { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 10px; }
        .stars i { font-size: 24px; color: #333; cursor: pointer; transition: 0.2s; }
        .stars i:hover, .stars i.active { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }

        .question-title { display: block; margin: 20px 0 10px; font-weight: bold; text-align: right; color: var(--primary-color); }
        .options { text-align: right; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; }
        .option-item { display: block; margin-bottom: 8px; cursor: pointer; font-size: 14px; }

        input[type="text"], input[type="tel"], select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #111;
            color: white;
            font-family: 'Cairo';
            box-sizing: border-box;
            outline: none;
        }
        
        input:focus, select:focus { border-color: var(--primary-color); }

        .submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.3);
        }

        .submit-btn:hover { background: #d35400; transform: translateY(-3px); }

    </style>
</head>
<body>

    <div class="container">
        <div class="main-card">
            <!-- استبدل الصورة برابط لوجو شيخ البلد الفعلي -->
            <img src="images.jpg" alt="شيخ البلد" class="profile-img">
            
            <h1>شيخ البلد</h1>
            <p>الكفتة بالمتر زي زمان</p>

            <div class="links-container">
                <a href="https://shaykhalbalad.github.io/shaykh-albalad/Menu" class="link-item"><i class="fas fa-utensils" style="color:#e67e22"></i><span class="link-text">المنيو (Menu)</span><i class="fas fa-chevron-left"></i></a>
                
                <!-- زر فتح نموذج التقييم -->
                <div class="link-item" onclick="openModal()">
                    <i class="fas fa-star" style="color:#f1c40f"></i>
                    <span class="link-text">قيم تجربتك معنا (شاركنا رأيك)</span>
                    <i class="fas fa-chevron-left"></i>
                </div>

                <a href="https://www.tiktok.com/@sheikhelbalad1?_r=1&_t=ZS-93NDLA8KpnB" class="link-item"><i class="fab fa-tiktok"></i><span class="link-text">تيك توك</span><i class="fas fa-chevron-left"></i></a>
                <a href="https://www.facebook.com/hatysheikhelbalad?rdid=yNW0jOI3cgYrmAib&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1XECYmKB8t%2F#" class="link-item"><i class="fab fa-facebook" style="color:#1877f2"></i><span class="link-text">فيسبوك</span><i class="fas fa-chevron-left"></i></a>
                <a href="tel:15188" class="link-item"><i class="fas fa-phone" style="color:#2ecc71"></i><span class="link-text">الخط الساخن: 15188</span><i class="fas fa-chevron-left"></i></a>
            </div>
        </div>
    </div>

    <!-- نافذة التقييم (Modal) -->
    <div class="modal-overlay" id="ratingModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 style="text-align:center; color: var(--primary-color); margin-bottom: 5px;">رأيك يهمنا</h2>
            <p style="text-align:center; font-size:14px; margin-bottom: 25px; color: #aaa;">يسعدنا سماع تجربتك في شيخ البلد</p>

            <form id="feedbackForm">
                
                <!-- البيانات الأساسية -->
                <div class="input-group">
                    <label><i class="fas fa-user-edit"></i> اسم الضيف</label>
                    <input type="text" id="name" placeholder="اكتب اسمك هنا..." required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-phone-alt"></i> رقم التليفون</label>
                    <input type="tel" id="phone" placeholder="رقم الموبايل للتواصل..." required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> اسم الفرع</label>
                    <select id="branch" required>
                        <option value="" disabled selected>اختر الفرع الذي قمت بزيارته</option>
                        <option value="المهندسين">فرع المهندسين</option>
                        <option value="التجمع">فرع التجمع الخامس</option>
                        <option value="اكتوبر">فرع 6 أكتوبر</option>
                        <option value="المعادي">فرع المعادي</option>
                        <option value="آخر">فرع آخر / دليفري</option>
                    </select>
                </div>

                <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">

                <!-- تقييم المنتج -->
                <div class="rating-group">
                    <label>1. جودة الأكل (المنتج)</label>
                    <div class="stars" data-category="product">
                        <i class="fas fa-star" data-value="5"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="1"></i>
                    </div>
                </div>

                <!-- تقييم الخدمة -->
                <div class="rating-group">
                    <label>2. سرعة وكفاءة الخدمة</label>
                    <div class="stars" data-category="service">
                        <i class="fas fa-star" data-value="5"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="1"></i>
                    </div>
                </div>

                <!-- تقييم النظافة -->
                <div class="rating-group">
                    <label>3. مستوى النظافة والجو العام</label>
                    <div class="stars" data-category="clean">
                        <i class="fas fa-star" data-value="5"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="1"></i>
                    </div>
                </div>

                <!-- عدد الزيارات -->
                <label class="question-title">كم مرة تزور شيخ البلد شهرياً تقريباً؟</label>
                <div class="options">
                    <label class="option-item"><input type="radio" name="visits" value="1"> مرة واحدة</label>
                    <label class="option-item"><input type="radio" name="visits" value="2"> مرتين</label>
                    <label class="option-item"><input type="radio" name="visits" value="3"> 3 مرات فأكثر</label>
                    <label class="option-item"><input type="radio" name="visits" value="first"> أول زيارة لي</label>
                </div>

                <!-- مقترحات -->
                <label class="question-title">ما هي وجبتك المفضلة أو أي مقترحات؟</label>
                <textarea rows="3" placeholder="اكتب وجبتك المفضلة أو أي ملاحظات لتحسين خدمتنا..."></textarea>

                <button type="submit" class="submit-btn">إرسال تقييمي الآن</button>
            </form>
        </div>
    </div>

<!-- استدعاء مكتبات Firebase -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyB1J7lSkqHHShPlkvtIUwpgmgsGqJ1uhJQ",
        authDomain: "sheikh-pro-61502.firebaseapp.com",
        databaseURL: "https://sheikh-pro-61502-default-rtdb.firebaseio.com",
        projectId: "sheikh-pro-61502",
        storageBucket: "sheikh-pro-61502.firebasestorage.app",
        messagingSenderId: "388665698743",
        appId: "1:388665698743:web:7eca2bfc0223f9c1736032",
        measurementId: "G-5F3J5S68LP"
    };

    // تهيئة Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // وظائف المودال (نافذة التقييم)
    window.openModal = function() { document.getElementById('ratingModal').style.display = 'flex'; }
    window.closeModal = function() { document.getElementById('ratingModal').style.display = 'none'; }

    // نظام النجوم
    let currentRatings = { product: 0, service: 0, clean: 0 };
    document.querySelectorAll('.stars i').forEach(star => {
        star.addEventListener('click', function() {
            const category = this.parentElement.getAttribute('data-category');
            const val = parseInt(this.getAttribute('data-value'));
            currentRatings[category] = val;
            
            const stars = this.parentElement.querySelectorAll('i');
            stars.forEach(s => {
                s.classList.toggle('active', s.getAttribute('data-value') <= val);
            });
        });
    });

    // إرسال البيانات إلى Firebase
    document.getElementById('feedbackForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const submitBtn = this.querySelector('.submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = "جاري الإرسال...";

        const newReview = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            branch: document.getElementById('branch').value,
            product: currentRatings.product,
            service: currentRatings.service,
            clean: currentRatings.clean,
            visits: document.querySelector('input[name="visits"]:checked')?.value || "غير محدد",
            comment: document.querySelector('textarea').value,
            date: new Date().toLocaleString('ar-EG') // تاريخ ووقت الإرسال
        };

        try {
            // دفع البيانات إلى فرع "reviews" في قاعدة البيانات
            await push(ref(db, 'reviews'), newReview);
            alert('شكراً لك! تم إرسال تقييمك بنجاح.');
            this.reset();
            closeModal();
            // إعادة تصفير النجوم
            document.querySelectorAll('.stars i').forEach(s => s.classList.remove('active'));
            currentRatings = { product: 0, service: 0, clean: 0 };
        } catch (error) {
            console.error("Error saving to Firebase:", error);
            alert('حدث خطأ أثناء الإرسال، حاول مرة أخرى.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "إرسال تقييمي الآن";
        }
    };
</script>
</body>
</html>
